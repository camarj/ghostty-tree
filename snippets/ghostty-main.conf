# Append these lines to your main Ghostty config at:
#   ~/Library/Application Support/com.mitchellh.ghostty/config
# (or ~/.config/ghostty/config on Linux)

# Option acts as Alt (required for zellij keybinds like Alt+B)
macos-option-as-alt = true

# Claude accent overrides (apply when using Flexoki Light/Dark base theme)
cursor-color = #da7756
# selection-background is set per-mode in the config-tree/config-tree-dark files
